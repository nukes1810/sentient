#####################################################################
#           SENTIENT SMART TUNING SYSTEM v3                         #
#           Nebula 370 | Xol | Rapido HF V2 | Sherpa Mini          #
#           Cartographer | ADXL345 | sentient_first_layer           #
#####################################################################

#####################################################################
#                    PERSISTENT VARIABLES                           #
#####################################################################
[save_variables]
filename: ~/printer_data/config/smart_tune_vars.cfg

#####################################################################
#                    CENTRAL STATE                                  #
#####################################################################
[gcode_macro _TUNE_VARS]
description: Central state for the smart tuning system
variable_current_height: 0
variable_accel_zone: "full"
variable_print_active: False
variable_chamber_target: 0
variable_filament_type: "PLA"
variable_max_accel: 4300
variable_shaper_x_freq: 58.6
variable_shaper_y_freq: 38.0
gcode:

#####################################################################
#                    NOZZLE TEMPERATURE OFFSET                      #
#####################################################################
[gcode_macro _TEMP_OFFSET_VARS]
description: Temperature offset configuration
variable_nozzle_temp_offset: 51
variable_offset_enabled: True
gcode:

[gcode_macro M104]
description: Set extruder temp with nozzle offset compensation
rename_existing: M104.1
gcode:
    {% set offset_enabled = printer["gcode_macro _TEMP_OFFSET_VARS"].offset_enabled %}
    {% set offset = printer["gcode_macro _TEMP_OFFSET_VARS"].nozzle_temp_offset %}
    {% if 'S' in params %}
        {% set TARGET = params.S|float %}
        {% if TARGET > 0 and offset_enabled %}
            {% set COMPENSATED = TARGET + offset %}
            {% if COMPENSATED > printer.configfile.settings.extruder.max_temp %}
                {% set COMPENSATED = printer.configfile.settings.extruder.max_temp %}
            {% endif %}
            {action_respond_info("Nozzle target: %.0f°C → Block: %.0f°C (+%d°C offset)" % (TARGET, COMPENSATED, offset))}
            M104.1 S{COMPENSATED}
        {% else %}
            M104.1 S{TARGET}
        {% endif %}
    {% else %}
        M104.1
    {% endif %}

[gcode_macro M109]
description: Set extruder temp and wait with nozzle offset compensation
rename_existing: M109.1
gcode:
    {% set offset_enabled = printer["gcode_macro _TEMP_OFFSET_VARS"].offset_enabled %}
    {% set offset = printer["gcode_macro _TEMP_OFFSET_VARS"].nozzle_temp_offset %}
    {% if 'S' in params %}
        {% set TARGET = params.S|float %}
        {% if TARGET > 0 and offset_enabled %}
            {% set COMPENSATED = TARGET + offset %}
            {% if COMPENSATED > printer.configfile.settings.extruder.max_temp %}
                {% set COMPENSATED = printer.configfile.settings.extruder.max_temp %}
            {% endif %}
            {action_respond_info("Waiting for nozzle: %.0f°C → Block: %.0f°C (+%d°C offset)" % (TARGET, COMPENSATED, offset))}
            M109.1 S{COMPENSATED}
        {% else %}
            M109.1 S{TARGET}
        {% endif %}
    {% else %}
        M109.1
    {% endif %}

[gcode_macro SET_NOZZLE_OFFSET]
description: Change the nozzle temperature offset
gcode:
    {% set OFFSET = params.OFFSET|default(51)|float %}
    SET_GCODE_VARIABLE MACRO=_TEMP_OFFSET_VARS VARIABLE=nozzle_temp_offset VALUE={OFFSET}
    {action_respond_info("Nozzle temp offset set to +%.0f°C" % OFFSET)}

[gcode_macro DISABLE_NOZZLE_OFFSET]
gcode:
    SET_GCODE_VARIABLE MACRO=_TEMP_OFFSET_VARS VARIABLE=offset_enabled VALUE=False
    {action_respond_info("Nozzle temp offset DISABLED")}

[gcode_macro ENABLE_NOZZLE_OFFSET]
gcode:
    SET_GCODE_VARIABLE MACRO=_TEMP_OFFSET_VARS VARIABLE=offset_enabled VALUE=True
    {action_respond_info("Nozzle temp offset ENABLED")}

[gcode_macro NOZZLE_OFFSET_STATUS]
gcode:
    {% set tv = printer["gcode_macro _TEMP_OFFSET_VARS"] %}
    {% set actual_temp = printer.extruder.temperature %}
    {% set display_temp = actual_temp - tv.nozzle_temp_offset %}
    {action_respond_info(
        "=== NOZZLE TEMP OFFSET ===\n"
        "Offset enabled:  %s\n"
        "Offset value:    +%d°C\n"
        "Block temp now:  %.1f°C\n"
        "Nozzle tip est:  %.1f°C\n"
        "=========================" % (
            tv.offset_enabled,
            tv.nozzle_temp_offset,
            actual_temp,
            display_temp
        )
    )}

#####################################################################
#                    FILAMENT CALIBRATION MACROS                    #
#  One tap per filament from KlipperScreen                          #
#####################################################################
[gcode_macro CALIBRATE_PLA]
description: Auto-calibrate Z offset for PLA
gcode:
    {action_respond_info("Starting PLA Z offset calibration...")}
    SENTIENT_CALIBRATE_Z FILAMENT=PLA BED_TEMP=60 NOZZLE_TEMP=215

[gcode_macro CALIBRATE_PETG]
description: Auto-calibrate Z offset for PETG
gcode:
    {action_respond_info("Starting PETG Z offset calibration...")}
    SENTIENT_CALIBRATE_Z FILAMENT=PETG BED_TEMP=80 NOZZLE_TEMP=250

[gcode_macro CALIBRATE_ASA]
description: Auto-calibrate Z offset for ASA
gcode:
    {action_respond_info("Starting ASA Z offset calibration...")}
    SENTIENT_CALIBRATE_Z FILAMENT=ASA BED_TEMP=100 NOZZLE_TEMP=260

[gcode_macro CALIBRATE_ABS]
description: Auto-calibrate Z offset for ABS
gcode:
    {action_respond_info("Starting ABS Z offset calibration...")}
    SENTIENT_CALIBRATE_Z FILAMENT=ABS BED_TEMP=100 NOZZLE_TEMP=250

[gcode_macro CALIBRATE_TPU]
description: Auto-calibrate Z offset for TPU
gcode:
    {action_respond_info("Starting TPU Z offset calibration...")}
    SENTIENT_CALIBRATE_Z FILAMENT=TPU BED_TEMP=35 NOZZLE_TEMP=230

[gcode_macro CALIBRATE_ALL_FILAMENTS]
description: Calibrate Z offset for all filaments sequentially
gcode:
    {action_respond_info("=== Calibrating all filaments ===")}
    {action_respond_info("This will take 20-30 minutes. Do not interrupt.")}
    CALIBRATE_PLA
    {action_respond_info("PLA done. Change to PETG filament if needed.")}
    G4 P5000
    CALIBRATE_PETG
    {action_respond_info("PETG done. Change to ASA filament if needed.")}
    G4 P5000
    CALIBRATE_ASA
    {action_respond_info("ASA done. Change to ABS filament if needed.")}
    G4 P5000
    CALIBRATE_ABS
    {action_respond_info("ABS done. Change to TPU filament if needed.")}
    G4 P5000
    CALIBRATE_TPU
    {action_respond_info("=== All filaments calibrated! ===")}
    SENTIENT_STATUS

#####################################################################
#                    SMART START PRINT                              #
#  Automatically applies saved filament Z offset                    #
#####################################################################
[gcode_macro START_PRINT]
description: Smart start with auto filament Z offset, heat soak, dynamic accel
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(0)|float %}
    {% set FILAMENT = params.FILAMENT|default("PLA")|string|upper %}

    # Store state
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=print_active VALUE=True
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=chamber_target VALUE={CHAMBER_TEMP}
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=filament_type VALUE='"{FILAMENT}"'
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=current_height VALUE=0
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=accel_zone VALUE='"full"'

    # LED busy
    status_busy

    {action_respond_info("=== sentient START_PRINT ===\nFilament: %s\nBed: %.0f°C\nNozzle: %.0f°C" % (FILAMENT, BED_TEMP, EXTRUDER_TEMP))}

    # Pre-heat nozzle to safe probing temp
    M104 S150
    # Heat bed
    M190 S{BED_TEMP}

    # Heat soak for ASA/ABS if enclosure is set up
    {% if CHAMBER_TEMP > 0 %}
        HEAT_SOAK CHAMBER_TEMP={CHAMBER_TEMP}
    {% endif %}

    # Home and level
    G90
    G28
    Z_TILT_ADJUST
    BED_MESH_CALIBRATE ADAPTIVE=1

    # Apply saved filament Z offset automatically
    SENTIENT_APPLY_FILAMENT_OFFSET FILAMENT={FILAMENT}

    # Move up before heating to print temp
    G1 Z5 F3000
    set_nozzle_leds_on

    # Heat to print temp
    M109 S{EXTRUDER_TEMP}
    G92 E0
    LINE_PURGE

    # Set initial accel zone
    _SET_ACCEL_ZONE ZONE="full"

    {action_respond_info("Print started | Filament: %s | Accel: %d mm/s²" % (FILAMENT, printer["gcode_macro _TUNE_VARS"].max_accel))}

#####################################################################
#                    END PRINT                                      #
#####################################################################
[gcode_macro END_PRINT]
description: End print, reset state
gcode:
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=print_active VALUE=False
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=current_height VALUE=0
    # Reset Z offset
    SET_GCODE_OFFSET Z=0 MOVE=1
    # Restore full accel
    _SET_ACCEL_ZONE ZONE="full"
    M140 S0
    M104 S0
    M106 S0
    G91
    G1 X-2 Y-2 E-3 F300
    G1 Z30 F3000
    G90
    G28 X Y
    M84
    status_ready
    {action_respond_info("Print complete. Z offset reset. Accel restored.")}

#####################################################################
#                    SHAPER CALIBRATION                             #
#####################################################################
[gcode_macro RUN_SHAPER_CALIBRATION]
description: Run input shaper and auto-update max_accel
gcode:
    {action_respond_info("Starting input shaper calibration...")}
    status_busy
    G28
    SHAPER_CALIBRATE
    {% set y_freq = printer.configfile.settings.input_shaper.shaper_freq_y|default(38.0)|float %}
    {% set new_accel = [((y_freq * y_freq * 3.14159 * 3.14159 * 0.3)|int), 2000]|max %}
    {action_respond_info("Y axis: %.1f Hz → Max accel: %d mm/s²" % (y_freq, new_accel))}
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=max_accel VALUE={new_accel}
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=shaper_y_freq VALUE={y_freq}
    {% set current_day = (printer.system_stats.cputime / 86400)|int %}
    SAVE_VARIABLE VARIABLE=last_shaper_day VALUE={current_day}
    SAVE_CONFIG

[gcode_macro AUTO_SHAPER_CALIBRATE]
description: Alias for RUN_SHAPER_CALIBRATION
gcode:
    RUN_SHAPER_CALIBRATION

#####################################################################
#                    DYNAMIC ACCEL BY HEIGHT                        #
#####################################################################
[gcode_macro _UPDATE_PRINT_HEIGHT]
description: Called every layer change to adjust accel
gcode:
    {% set Z = params.Z|default(0)|float %}
    SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=current_height VALUE={Z}
    {% if Z < 50 %}
        _SET_ACCEL_ZONE ZONE="full"
    {% elif Z < 150 %}
        _SET_ACCEL_ZONE ZONE="medium"
    {% else %}
        _SET_ACCEL_ZONE ZONE="conservative"
    {% endif %}

[gcode_macro _SET_ACCEL_ZONE]
description: Apply accel limits for a given zone
gcode:
    {% set ZONE = params.ZONE|default("full")|string %}
    {% set current = printer["gcode_macro _TUNE_VARS"].accel_zone %}
    {% set max_accel = printer["gcode_macro _TUNE_VARS"].max_accel|int %}
    {% set accel_full = max_accel %}
    {% set accel_medium = (max_accel * 0.70)|int %}
    {% set accel_conservative = (max_accel * 0.45)|int %}

    {% if ZONE != current %}
        SET_GCODE_VARIABLE MACRO=_TUNE_VARS VARIABLE=accel_zone VALUE='"{ZONE}"'
        {% if ZONE == "full" %}
            SET_VELOCITY_LIMIT ACCEL={accel_full} ACCEL_TO_DECEL={accel_full // 2} SQUARE_CORNER_VELOCITY=5
            {action_respond_info("Zone: FULL — %d mm/s² — Z < 50mm" % accel_full)}
        {% elif ZONE == "medium" %}
            SET_VELOCITY_LIMIT ACCEL={accel_medium} ACCEL_TO_DECEL={accel_medium // 2} SQUARE_CORNER_VELOCITY=5
            {action_respond_info("Zone: MEDIUM — %d mm/s² — Z 50-150mm" % accel_medium)}
        {% elif ZONE == "conservative" %}
            SET_VELOCITY_LIMIT ACCEL={accel_conservative} ACCEL_TO_DECEL={accel_conservative // 2} SQUARE_CORNER_VELOCITY=4
            {action_respond_info("Zone: SAFE — %d mm/s² — Z > 150mm" % accel_conservative)}
        {% endif %}
    {% endif %}

#####################################################################
#                    MANUAL ACCEL OVERRIDES                         #
#####################################################################
[gcode_macro ACCEL_FULL]
gcode:
    _SET_ACCEL_ZONE ZONE="full"

[gcode_macro ACCEL_MEDIUM]
gcode:
    _SET_ACCEL_ZONE ZONE="medium"

[gcode_macro ACCEL_CONSERVATIVE]
gcode:
    _SET_ACCEL_ZONE ZONE="conservative"

#####################################################################
#                    HEAT SOAK                                      #
#####################################################################
[gcode_macro HEAT_SOAK]
description: Wait for chamber to reach target temp
gcode:
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(40)|float %}
    {% set MAX_WAIT = params.MAX_WAIT|default(20)|int %}
    status_busy
    {action_respond_info("Heat soak: waiting for %.0f°C (max %d min)" % (CHAMBER_TEMP, MAX_WAIT))}
    M106 S0
    {% set ns = namespace(elapsed=0) %}
    {% for i in range(MAX_WAIT * 6) %}
        {% if printer["temperature_sensor enclosure_temp"].temperature < CHAMBER_TEMP %}
            G4 P10000
            {% set ns.elapsed = ns.elapsed + 10 %}
            {action_respond_info("Chamber: %.1f°C / %.0f°C (%ds)" % (
                printer["temperature_sensor enclosure_temp"].temperature,
                CHAMBER_TEMP,
                ns.elapsed))}
        {% endif %}
    {% endfor %}
    {action_respond_info("Heat soak complete. Chamber: %.1f°C" % printer["temperature_sensor enclosure_temp"].temperature)}

#####################################################################
#                    TUNE STATUS                                    #
#####################################################################
[gcode_macro TUNE_STATUS]
description: Print current tuning system status
gcode:
    {% set tv = printer["gcode_macro _TUNE_VARS"] %}
    {% set svv = printer.save_variables.variables %}
    {% set last_day = svv.last_shaper_day|default(0)|int %}
    {% set current_day = (printer.system_stats.cputime / 86400)|int %}
    {% set days_since = current_day - last_day %}
    {% set max_accel = tv.max_accel|int %}
    {action_respond_info(
        "=== SENTIENT TUNE STATUS ===\n"
        "Print active:     %s\n"
        "Filament:         %s\n"
        "Current Z:        %.1fmm\n"
        "Speed zone:       %s\n"
        "Max accel:        %d mm/s²\n"
        "Medium accel:     %d mm/s²\n"
        "Safe accel:       %d mm/s²\n"
        "Y shaper freq:    %.1f Hz\n"
        "Chamber temp:     %.1f°C\n"
        "Shaper last run:  %d days ago\n"
        "Nozzle offset:    +%d°C\n"
        "============================" % (
            tv.print_active,
            tv.filament_type,
            tv.current_height,
            tv.accel_zone,
            max_accel,
            (max_accel * 0.70)|int,
            (max_accel * 0.45)|int,
            tv.shaper_y_freq,
            printer["temperature_sensor enclosure_temp"].temperature,
            days_since,
            printer["gcode_macro _TEMP_OFFSET_VARS"].nozzle_temp_offset
        )
    )}
    # Also show filament offsets
    SENTIENT_STATUS